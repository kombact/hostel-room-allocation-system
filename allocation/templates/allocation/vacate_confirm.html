{% extends 'allocation/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body text-center p-4">
                <i class="bi bi-door-open fs-1 text-warning"></i>
                <h5 class="mt-3">Vacate Room {{ allocation.room.room_number }}?</h5>
                <p class="text-muted">
                    Student: <strong>{{ allocation.student.name }}</strong><br>
                    Block: <strong>{{ allocation.room.block }}</strong>
                </p>
                <p class="text-info small">If a waitlisted student matches this room, they will be auto-allocated.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-warning me-2">Yes, Vacate</button>
                    <a href="{% url 'allocation_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
